kind: Deployment
apiVersion: apps/v1
metadata:
  name: backend-deployment
  namespace: retail-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: backend
          image: 288096932508.dkr.ecr.ap-south-1.amazonaws.com/dockerimage-repo:backend-20
          ports:
            - containerPort: 5001
          env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/ecommerce
            - name: JWT_SECRET
              value: supersecret
