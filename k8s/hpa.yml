kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:   
  name: frontend-hpa 
  namespace: retail-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource: 
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50