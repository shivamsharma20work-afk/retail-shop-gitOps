kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: my-ingress
  namespace: retail-app
spec:
  rules:
    - host: retail.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: 
              service:
                name: frontend-service
                port: 
                  number: 80
          - path: /api
            pathType: Prefix
            backend:  
              service:
                name: backend
                port: 
                  number: 5001